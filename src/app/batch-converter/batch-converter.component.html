<!-- batch-converter/batch-converter.component.html -->
<div class="bg-base-100 rounded-3xl shadow-xl border-base-200 p-8">
	<!-- Base font size selector -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-base-content mb-3">Base Font Size</label>
		<div class="flex items-center gap-3">
			<input
				type="number"
				[value]="converterService.baseFontSize()"
				(input)="onBaseFontSizeInput($event)"
				class="input input-bordered w-28"
				min="1"
			/>
			<span class="text-lg text-base-content/70">pixels</span>
		</div>
	</div>

	<!-- Conversion direction -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-base-content mb-3">Convert From</label>
		<div class="flex gap-4">
			<button
				type="button"
				(click)="setConversionType('remToPx')"
				[class.btn-primary]="conversionType() === 'remToPx'"
				[class.btn-ghost]="conversionType() !== 'remToPx'"
				class="btn"
			>
				REM to Pixels
			</button>
			<button
				type="button"
				(click)="setConversionType('pxToRem')"
				[class.btn-primary]="conversionType() === 'pxToRem'"
				[class.btn-ghost]="conversionType() !== 'pxToRem'"
				class="btn"
			>
				Pixels to REM
			</button>
		</div>
	</div>

	<!-- Input area -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-base-content mb-3">Input CSS</label>
		<textarea
			[value]="inputText()"
			(input)="onInputChange($event)"
			[placeholder]="inputPlaceholder"
			class="textarea textarea-bordered w-full h-48 font-mono"
		></textarea>
	</div>

	<!-- Output area -->
	@if (convertedText()) {
		<div>
			<label class="block text-lg font-semibold text-base-content mb-3">Converted CSS</label>
			<div class="relative">
				<textarea [value]="convertedText()" readonly class="textarea textarea-bordered w-full h-48 font-mono bg-base-200"></textarea>
				<button
					(click)="copyToClipboard()"
					class="btn btn-primary btn-sm absolute top-3 right-3 gap-2"
				>
					<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"
						/>
					</svg>
					{{ copied() ? '✓ Copied' : 'Copy' }}
				</button>
			</div>
		</div>
	}
</div>
