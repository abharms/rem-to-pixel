<div class="bg-white rounded-3xl shadow-xl border-gray-100 p-8">
	<!-- Base font size selector -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-gray-700 mb-3">Base Font Size</label>
		<div class="flex items-center gap-3">
			<input
				type="number"
				[value]="baseFontSize()"
				(input)="onBaseFontSizeInput($event)"
				class="w-28 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all"
				min="1"
			/>
			<span class="text-lg text-gray-600">pixels</span>
		</div>
	</div>

	<!-- Conversion direction -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-gray-700 mb-3">Convert From</label>
		<div class="flex gap-4">
			<button
				type="button"
				(click)="setConversionType('remToPx')"
				[class.bg-indigo-500]="conversionType() === 'remToPx'"
				[class.text-white]="conversionType() === 'remToPx'"
				[class.bg-gray-100]="conversionType() !== 'remToPx'"
				class="px-4 py-2 rounded-xl font-medium transition-all hover:shadow-md"
			>
				REM to Pixels
			</button>
			<button
				type="button"
				(click)="setConversionType('pxToRem')"
				[class.bg-indigo-500]="conversionType() === 'pxToRem'"
				[class.text-white]="conversionType() === 'pxToRem'"
				[class.bg-gray-100]="conversionType() !== 'pxToRem'"
				class="px-4 py-2 rounded-xl font-medium transition-all hover:shadow-md"
			>
				Pixels to REM
			</button>
		</div>
	</div>

	<!-- Input area -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-gray-700 mb-3">Input CSS</label>
		<textarea
			[value]="inputText()"
			(input)="onInputChange($event)"
			[placeholder]="inputPlaceholder()"
			class="w-full h-48 px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all font-mono"
		></textarea>
	</div>

	<!-- Convert button -->
	<div class="mb-6">
		<button
			(click)="convertValues()"
			class="w-full bg-indigo-500 text-white px-6 py-3 rounded-xl font-medium hover:bg-indigo-600 transition-all hover:shadow-md"
			[disabled]="!inputText()"
		>
			Convert Values
		</button>
	</div>

	<!-- Output area -->
	@if (convertedText()) {
		<div>
			<label class="block text-lg font-semibold text-gray-700 mb-3">Converted CSS</label>
			<div class="relative">
				<textarea [value]="convertedText()" readonly class="w-full h-48 px-5 py-3 border border-gray-300 rounded-xl shadow-sm bg-gray-50 font-mono"></textarea>
				<button
					(click)="copyToClipboard()"
					class="absolute top-3 right-3 bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm hover:bg-indigo-600 transition-all hover:shadow-md flex items-center gap-2"
				>
					<svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"
						/>
					</svg>
					Copy
				</button>
			</div>
		</div>
	}
</div>
