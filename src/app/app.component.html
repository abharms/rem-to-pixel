<div class="min-h-screen bg-gradient-to-r from-blue-50 via-gray-100 to-blue-100 p-8">
	<div class="max-w-2xl mx-auto space-y-10">
		<!-- Header -->
		<div class="text-center">
			<h1 class="text-5xl font-extrabold text-indigo-600 mb-3 text-shadow-md">REM to Pixel Converter</h1>
			<p class="text-lg text-gray-700">Easily convert between pixels and rems</p>
		</div>

		<!-- Main conversion card -->
		<div class="bg-white rounded-3xl shadow-xl border-gray-100 p-8" [formGroup]="converterForm">
			<!-- Base font size selector -->
			<div class="mb-6">
				<label class="block text-lg font-semibold text-gray-700 mb-3">Base Font Size</label>
				<div class="flex items-center gap-3">
					<input
						type="number"
						formControlName="baseFontSize"
						class="w-28 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all"
						min="1"
					/>
					<span class="text-lg text-gray-600">pixels</span>
				</div>
			</div>

			<!-- Conversion inputs -->
			<div class="flex flex-col md:flex-row md:space-x-6 space-y-4 md:space-y-0">
				<!-- REM input -->
				<div class="flex-1">
					<label class="block text-lg font-semibold text-gray-700 mb-3">REM</label>
					<div class="relative">
						<input
							type="number"
							formControlName="remValue"
							placeholder="Enter rems..."
							class="w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all"
						/>
					</div>
				</div>

				<!-- SVG icon (acts as a separator) -->
				<div class="flex justify-center items-center py-2">
					<svg
						xmlns="http://www.w3.org/2000/svg"
						class="h-8 w-8 text-indigo-500 hover:rotate-45 transition-transform"
						fill="none"
						viewBox="0 0 24 24"
						stroke="currentColor"
					>
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
					</svg>
				</div>

				<!-- Pixels input -->
				<div class="flex-1">
					<label class="block text-lg font-semibold text-gray-700 mb-3">Pixels</label>
					<div class="relative">
						<input
							type="number"
							formControlName="pixelValue"
							placeholder="Enter pixels..."
							class="w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all"
						/>
					</div>
				</div>
			</div>
		</div>

		<!-- Quick reference -->
		<div class="bg-white rounded-3xl shadow-xl p-8">
			<h2 class="text-xl font-semibold text-gray-800 mb-5">Quick Reference</h2>
			<div class="grid grid-cols-2 md:grid-cols-3 gap-6">
				<div class="text-center p-4 bg-indigo-50 rounded-xl hover:shadow-md hover:bg-indigo-100 transition-colors">
					<div class="font-semibold text-indigo-700">16px</div>
					<div class="text-indigo-600">1rem</div>
				</div>
				<div class="text-center p-4 bg-indigo-50 rounded-xl hover:shadow-md hover:bg-indigo-100 transition-colors">
					<div class="font-semibold text-indigo-700">24px</div>
					<div class="text-indigo-600">1.5rem</div>
				</div>
				<div class="text-center p-4 bg-indigo-50 rounded-xl hover:shadow-md hover:bg-indigo-100 transition-colors">
					<div class="font-semibold text-indigo-700">32px</div>
					<div class="text-indigo-600">2rem</div>
				</div>
			</div>
		</div>
	</div>
</div>
