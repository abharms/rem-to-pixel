<!-- converter-container.component.html -->
<div class="min-h-screen bg-gradient-to-r from-blue-50 via-gray-100 to-blue-100 p-8">
	<div class="max-w-2xl mx-auto space-y-10">
		<!-- Header -->
		<div class="text-center">
			<h1 class="text-5xl font-extrabold text-indigo-600 mb-3 text-shadow-md">REM to Pixel Converter</h1>
			<p class="text-lg text-gray-700">Easily convert between pixels and rems</p>
		</div>

		<!-- Converter Type Selection -->
		<div class="bg-white rounded-3xl shadow-xl border-gray-100 p-8">
			<div class="mb-6">
				<label class="block text-lg font-semibold text-gray-700 mb-3">Converter Type</label>
				<div class="flex gap-4">
					<button
						type="button"
						(click)="setConverterType('single')"
						[class.bg-indigo-500]="converterType() === 'single'"
						[class.text-white]="converterType() === 'single'"
						[class.bg-gray-100]="converterType() !== 'single'"
						class="px-4 py-2 rounded-xl font-medium transition-all hover:shadow-md"
					>
						Single Value
					</button>
					<button
						type="button"
						(click)="setConverterType('batch')"
						[class.bg-indigo-500]="converterType() === 'batch'"
						[class.text-white]="converterType() === 'batch'"
						[class.bg-gray-100]="converterType() !== 'batch'"
						class="px-4 py-2 rounded-xl font-medium transition-all hover:shadow-md"
					>
						Batch Convert
					</button>
				</div>
			</div>
		</div>

		<!-- Converter Components -->
		<div [ngSwitch]="converterType()">
			<app-single-value *ngSwitchCase="'single'" [baseFontSize]="baseFontSize()" (baseFontSizeChange)="updateBaseFontSize($event)"></app-single-value>

			<app-batch-converter *ngSwitchCase="'batch'" [baseFontSize]="baseFontSize()" (baseFontSizeChange)="updateBaseFontSize($event)"></app-batch-converter>
		</div>

		<!-- Quick reference -->
		<div class="bg-white rounded-3xl shadow-xl p-8">
			<h2 class="text-xl font-semibold text-gray-800 mb-5">Quick Reference</h2>
			<div class="grid grid-cols-2 md:grid-cols-3 gap-6">
				<div class="text-center p-4 bg-indigo-50 rounded-xl hover:shadow-md hover:bg-indigo-100 transition-colors">
					<div class="font-semibold text-indigo-700">16px</div>
					<div class="text-indigo-600">1rem</div>
				</div>
				<div class="text-center p-4 bg-indigo-50 rounded-xl hover:shadow-md hover:bg-indigo-100 transition-colors">
					<div class="font-semibold text-indigo-700">24px</div>
					<div class="text-indigo-600">1.5rem</div>
				</div>
				<div class="text-center p-4 bg-indigo-50 rounded-xl hover:shadow-md hover:bg-indigo-100 transition-colors">
					<div class="font-semibold text-indigo-700">32px</div>
					<div class="text-indigo-600">2rem</div>
				</div>
			</div>
		</div>
	</div>
</div>
