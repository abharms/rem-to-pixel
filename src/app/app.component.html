<div class="min-h-screen bg-gray-100 p-8">
	<div class="max-w-xl mx-auto space-y-8">
		<!-- Header -->
		<div class="text-center">
			<h1 class="text-4xl font-bold text-gray-900 mb-2">REM to Pixel Converter</h1>
			<p class="text-gray-600">Convert between pixels and rems with ease</p>
		</div>

		<!-- Main conversion card -->
		<div class="bg-white rounded-xl shadow-lg p-6" [formGroup]="converterForm">
			<!-- Base font size selector -->
			<div class="mb-6">
				<label class="block text-sm font-medium text-gray-700 mb-2">Base Font Size</label>
				<div class="flex items-center gap-3">
					<input
						type="number"
						formControlName="baseFontSize"
						class="w-24 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
						min="1"
					/>
					<span class="text-gray-600">pixels</span>
				</div>
			</div>

			<div class="grid grid-cols-1 gap-2">
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-2">Pixels</label>
					<div class="relative">
						<input
							type="number"
							formControlName="pixelValue"
							placeholder="Enter pixels..."
							class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
						/>
					</div>
				</div>

				<div class="flex justify-center py-2">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-teal-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4" />
					</svg>
				</div>

				<div>
					<label class="block text-sm font-medium text-gray-700 mb-2">REM</label>
					<div class="relative">
						<input
							type="number"
							formControlName="remValue"
							placeholder="Enter rems..."
							class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
						/>
					</div>
				</div>
			</div>
		</div>

		<!-- Quick reference -->
		<div class="bg-white rounded-xl shadow-lg p-6">
			<h2 class="text-lg font-semibold text-gray-900 mb-4">Quick Reference</h2>
			<div class="grid grid-cols-2 md:grid-cols-3 gap-4">
				<div class="text-center p-3 bg-gray-50 rounded-lg hover:border-teal-500 border border-transparent transition-colors">
					<div class="font-medium text-gray-900">16px</div>
					<div class="text-gray-600">1rem</div>
				</div>
				<div class="text-center p-3 bg-gray-50 rounded-lg hover:border-teal-500 border border-transparent transition-colors">
					<div class="font-medium text-gray-900">24px</div>
					<div class="text-gray-600">1.5rem</div>
				</div>
				<div class="text-center p-3 bg-gray-50 rounded-lg hover:border-teal-500 border border-transparent transition-colors">
					<div class="font-medium text-gray-900">32px</div>
					<div class="text-gray-600">2rem</div>
				</div>
			</div>
		</div>
	</div>
</div>
