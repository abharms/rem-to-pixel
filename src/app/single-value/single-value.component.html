<div class="bg-white rounded-3xl shadow-xl border-gray-100 p-8">
	<!-- Base font size selector -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-gray-700 mb-3">Base Font Size</label>
		<div class="flex items-center gap-3">
			<input
				type="number"
				[value]="baseFontSize()"
				(input)="onBaseFontSizeInput($event)"
				class="w-28 px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all"
				min="1"
			/>
			<span class="text-lg text-gray-600">pixels</span>
		</div>
	</div>

	<!-- Conversion direction -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-gray-700 mb-3">Convert From</label>
		<div class="flex gap-4">
			<button
				type="button"
				(click)="setConversionType('remToPx')"
				[class.bg-indigo-500]="conversionType() === 'remToPx'"
				[class.text-white]="conversionType() === 'remToPx'"
				[class.bg-gray-100]="conversionType() !== 'remToPx'"
				class="px-4 py-2 rounded-xl font-medium transition-all hover:shadow-md"
			>
				REM to Pixels
			</button>
			<button
				type="button"
				(click)="setConversionType('pxToRem')"
				[class.bg-indigo-500]="conversionType() === 'pxToRem'"
				[class.text-white]="conversionType() === 'pxToRem'"
				[class.bg-gray-100]="conversionType() !== 'pxToRem'"
				class="px-4 py-2 rounded-xl font-medium transition-all hover:shadow-md"
			>
				Pixels to REM
			</button>
		</div>
	</div>

	<!-- Conversion inputs -->
	<div class="flex flex-col md:flex-row md:space-x-6 space-y-4 md:space-y-0">
		<!-- First input -->
		<div class="flex-1">
			<label class="block text-lg font-semibold text-gray-700 mb-3">
				{{ conversionType() === 'remToPx' ? 'REM' : 'Pixels' }}
			</label>
			<div class="relative">
				<input
					type="number"
					[value]="conversionType() === 'remToPx' ? remValue() : pixelValue()"
					(input)="handleInputChange($event, true)"
					[placeholder]="'Enter ' + (conversionType() === 'remToPx' ? 'rems...' : 'pixels...')"
					class="w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all"
				/>
			</div>
		</div>

		<!-- Arrow icon -->
		<div class="flex justify-center items-center py-2">
			<svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
			</svg>
		</div>

		<!-- Second input (result) -->
		<div class="flex-1">
			<label class="block text-lg font-semibold text-gray-700 mb-3">
				{{ conversionType() === 'remToPx' ? 'Pixels' : 'REM' }}
			</label>
			<div class="relative">
				<input
					type="number"
					[value]="conversionType() === 'remToPx' ? pixelValue() : remValue()"
					(input)="handleInputChange($event, false)"
					[placeholder]="'Enter ' + (conversionType() === 'remToPx' ? 'pixels...' : 'rems...')"
					class="w-full px-5 py-3 border border-gray-300 rounded-xl shadow-sm focus:ring-4 focus:ring-indigo-300 focus:border-indigo-500 hover:bg-gray-50 transition-all"
				/>
			</div>
		</div>
	</div>
</div>
