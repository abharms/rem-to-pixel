<!-- single-value/single-value.component.html -->
<div class="bg-base-100 rounded-3xl shadow-xl border-base-200 p-8">
	<!-- Base font size selector -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-base-content mb-3">Base Font Size</label>
		<div class="flex items-center gap-3">
			<input
				type="number"
				[value]="converterService.baseFontSize()"
				(input)="onBaseFontSizeInput($event)"
				class="input input-bordered w-28"
				min="1"
			/>
			<span class="text-lg text-base-content/70">pixels</span>
		</div>
	</div>

	<!-- Conversion direction -->
	<div class="mb-6">
		<label class="block text-lg font-semibold text-base-content mb-3">Convert From</label>
		<div class="flex gap-4">
			<button
				type="button"
				(click)="setConversionType('remToPx')"
				[class.btn-primary]="conversionType() === 'remToPx'"
				[class.btn-ghost]="conversionType() !== 'remToPx'"
				class="btn"
			>
				REM to Pixels
			</button>
			<button
				type="button"
				(click)="setConversionType('pxToRem')"
				[class.btn-primary]="conversionType() === 'pxToRem'"
				[class.btn-ghost]="conversionType() !== 'pxToRem'"
				class="btn"
			>
				Pixels to REM
			</button>
		</div>
	</div>

	<!-- Conversion inputs -->
	<div class="flex flex-col md:flex-row md:space-x-6 space-y-4 md:space-y-0">
		<!-- First input -->
		<div class="flex-1">
			<label class="block text-lg font-semibold text-base-content mb-3">
				{{ conversionType() === 'remToPx' ? 'REM' : 'Pixels' }}
			</label>
			<div class="relative">
				<input
					type="number"
					[value]="conversionType() === 'remToPx' ? remValue() : pixelValue()"
					(input)="handleInputChange($event, true)"
					[placeholder]="'Enter ' + (conversionType() === 'remToPx' ? 'rems...' : 'pixels...')"
					class="input input-bordered w-full"
				/>
			</div>
		</div>

		<!-- Arrow icon -->
		<div class="flex justify-center items-center py-2">
			<svg xmlns="http://www.w3.org/2000/svg" class="hidden md:block h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
			</svg>
			<svg xmlns="http://www.w3.org/2000/svg" class="md:hidden h-8 w-8 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 17l4 4m0 0l4-4m-4 4V3" />
			</svg>
		</div>

		<!-- Second input -->
		<div class="flex-1">
			<label class="block text-lg font-semibold text-base-content mb-3">
				{{ conversionType() === 'remToPx' ? 'Pixels' : 'REM' }}
			</label>
			<div class="relative">
				<input
					type="number"
					[value]="conversionType() === 'remToPx' ? pixelValue() : remValue()"
					(input)="handleInputChange($event, false)"
					[placeholder]="'Enter ' + (conversionType() === 'remToPx' ? 'pixels...' : 'rems...')"
					class="input input-bordered w-full"
				/>
			</div>
		</div>
	</div>
	<div class="mt-8 text-center">
		<p class="text-3xl font-medium text-base-content">
			Result:
			@if (conversionType() === 'remToPx' && remValue()) {
				<span class="text-primary">{{ pixelValue() }}px</span>
			} @else if (conversionType() === 'pxToRem' && pixelValue()) {
				<span class="text-primary">{{ remValue() }}rem</span>
			} @else {
				<span class="text-base-content/50">--</span>
			}
		</p>
	</div>
</div>
